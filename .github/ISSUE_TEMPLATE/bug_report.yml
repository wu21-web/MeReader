name: Bug report
description: Report a reproducible bug in MeReader.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please read SECURITY.md before submitting sensitive details.
        If this is a pothole report, mail the maintainer directly: wu2196674@gmail.com.

        Security-related reports must not be posted publicly in issues.
        See SECURITY.md for the reporting process.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I read SECURITY.md and confirmed this is safe to report publicly.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is the bug?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, and any relevant details.
      placeholder: Ubuntu 24.04, Chrome 124, Node 20
    validations:
      required: false
