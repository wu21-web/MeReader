name: Update Project

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-project
  cancel-in-progress: false

jobs:
  update-project:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_PAT }}
        
      - name: Install tree
        run: sudo apt update && sudo apt install -y tree
      
      - name: Fetch Structure
        run: tree -L 5 -I 'node_modules|.git|.gemini|dist|build|coverage|project-tree.txt' -o project-tree.txt .

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add project-tree.txt
          git commit -m "Update project structure" || echo "No changes to commit"
          git push origin HEAD
      
