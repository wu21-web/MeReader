name: Update Project Structure

on:
  push:
    branches: ["main"]
  workflow_dispatch: 

jobs:
  update-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the automatic GITHUB_TOKEN permission to push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches history so git diff can compare against the previous state

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate project structure
        run: |
          tree -I '__pycache__|*.pyc|.git|.venv|node_modules|.DS_Store' > project-tree.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add project-tree.txt
          
          # This checks if the tree you just generated is different from the one in the repo
          if git diff --staged --quiet; then
            echo "No changes to project structure. Skipping push."
          else
            echo "Changes detected! Updating project-tree.txt..."
            git commit -m "chore: update project structure"
            git pull --rebase origin main
            git push origin main
          fi
